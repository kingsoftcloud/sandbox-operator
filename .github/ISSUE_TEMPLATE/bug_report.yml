name: Bug report
description: Create a report to help us improve Sandbox Operator.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps that allow us to reproduce the behavior.
      placeholder: |
        1. Deploy operator with ...
        2. Apply the following CR ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
  - type: textarea
    id: manifests
    attributes:
      label: Relevant manifests
      description: Please paste the relevant CRs or Secrets (replace sensitive values with placeholders).
      render: yaml
  - type: textarea
    id: logs
    attributes:
      label: Operator logs
      description: Paste relevant operator logs (replace sensitive values with placeholders).
      render: text
  - type: input
    id: version
    attributes:
      label: Version
      description: Operator version or Git commit, Kubernetes version, and Go version.
      placeholder: operator v0.1.0 / Kubernetes v1.30 / Go 1.26
