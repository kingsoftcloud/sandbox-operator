                                      type: object
                                      properties:
                                        name:
                                          type: string
                                        type:
                                          type: string
                                        size:
                                          type: string
                                        deleteWithInstance:
                                          type: boolean
                                        path:
                                          type: string
                                        snapshotID:
                                          type: string
                                        fsType:
                                          type: string
                        ports:
                          type: array
                          items:
                            type: object
                            properties:
                              name:
                                type: string
                              containerPort:
                                type: integer
                                minimum: 1
                                maximum: 65535
                              protocol:
                                type: string
                                enum: ["TCP", "UDP"]
                        startCommand:
                          type: string
                        env:
                          type: array
                          items:
                            type: object
                            required: ["name"]
                            properties:
                              name:
                                type: string
                              value:
                                type: string
                        storageCredentialRef:
                          type: object
                          properties:
                            name:
                              type: string
                        ks3MountConfig:
                          type: object
                          properties:
                            enabled:
                              type: boolean
                            mountPoints:
                              type: array
                              items:
                                type: object
                                properties:
                                  bucketName:
                                    type: string
                                  remotePath:
                                    type: string
                                  localMountPath:
                                    type: string
                                  readOnly:
                                    type: boolean
                        kpfsMountConfig:
                          type: object
                          properties:
                            enabled:
                              type: boolean
                            mountPoints:
                              type: array
                              items:
                                type: object
                                properties:
                                  fileSystemName:
                                    type: string
                                  remotePath:
                                    type: string
                                  localMountPath:
                                    type: string
                                  readOnly:
                                    type: boolean
                        networkConfig:
                          type: object
                          properties:
                            enablePublic:
                              type: boolean
                            enablePrivate:
                              type: boolean
                            cidrBlock:
                              type: string
                            changeDefaultRoute:
                              type: boolean
                            userVpcId:
                              type: string
                            userSgId:
                              type: string
                            userSubnetId:
                              type: string
                            availabilityZone:
                              type: string
                        skillConfig:
                          type: object
                          properties:
                            enable:
                              type: boolean
                            spaceIds:
                              type: array
                              items:
                                type: string
                            enablePublicSkill:
                              type: boolean
                        pool:
                          type: object
                          properties:
                            targetSize:
                              type: integer
                              minimum: 0
                        observability:
                          type: object
                          properties:
                            logging:
                              type: object
                              properties:
                                enabled:
                                  type: boolean
                                projectName:
                                  type: string
                                endpoint:
                                  type: string
                                containerPoolName:
                                  type: string
                                hostPoolName:
                                  type: string
                                rules:
                                  type: array
                                  items:
                                    type: string
                                credentialRef:
                                  type: object
                                  properties:
                                    name:
                                      type: string
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
