apiVersion: v1
kind: Secret
metadata:
  name: sandbox-openapi-credentials
  namespace: sandbox-demo
  labels:
    sandbox.ksyun.com/credential-type: openapi
type: Opaque
stringData:
  accessKeyId: "<OPENAPI_ACCESS_KEY_ID>"
  secretAccessKey: "<OPENAPI_SECRET_ACCESS_KEY>"
  accountId: "<ACCOUNT_ID>"
  region: "cn-beijing-6"
---
apiVersion: sandbox.kce.ksyun.com/v1alpha1
kind: SandboxTemplate
metadata:
  name: custom-app
  namespace: sandbox-demo
  labels:
    owner: console
spec:
  description: "custom app runtime"
  type: Custom
  access: Private
  template:
    spec:
      image:
        source: Public
        image: "hub.kce.ksyun.com/sandbox/aio:v20260608"
        registryCredentialRef:
          name: image-credential
          server: hub.kce.ksyun.com
      kecConfig:
        cpu: "2"
        memory: 4Gi
        instanceSpecs:
          - instanceType: S6.2B
            systemDisk:
              type: SSD3.0
              size: 20Gi
            dataDisks:
              - name: data-0
                type: SSD3.0
                size: 50Gi
                deleteWithInstance: true
                path: /root/tmp
                fsType: ext4
          - instanceType: S6.2A
            systemDisk:
              type: SSD3.0
              size: 20Gi
            dataDisks:
              - name: data-0
                type: SSD3.0
                size: 50Gi
                deleteWithInstance: true
                path: /root/tmp
                fsType: ext4
      ports:
        - name: http
          containerPort: 8080
          protocol: TCP
      startCommand: "python /home/user/app.py"
      env:
        - name: APP_ENV
          value: "prod"
      storageCredentialRef:
        name: storage-credential
      ks3MountConfig:
        enabled: true
        mountPoints:
          - bucketName: bucket-a
            remotePath: /datasets
            localMountPath: /mnt/ks3/datasets
            readOnly: true
      kpfsMountConfig:
        enabled: true
        mountPoints:
          - fileSystemName: kcitest1
            remotePath: /
            localMountPath: /mnt/kpfs/kcitest1
            readOnly: false
      networkConfig:
        enablePublic: true
        enablePrivate: true
        cidrBlock: "10.0.2.0/24"
        sharedInternetAccessEnable: true
        userVpcId: "vpc-xxxx"
        userSgId: "sg-xxxx"
        userSubnetId: "subnet-xxxx"
      skillConfig:
        enable: true
        spaceIds:
          - space-abc123
          - space-def456
        enablePublicSkill: false
      pool:
        targetSize: 1
      observability:
        logging:
          enabled: true
          projectName: sandbox-log
          endpoint: "https://klog-cn-beijing.ksyun.com"
          containerPoolName: sandbox-container
          hostPoolName: sandbox-host
          rules:
            - "/home/user/*.log"
          credentialRef:
            name: klog-credential
---
apiVersion: sandbox.kce.ksyun.com/v1alpha1
kind: Sandbox
metadata:
  name: demo-sandbox
  namespace: sandbox-demo
spec:
  templateRef:
    name: custom-app
  timeoutSeconds: 1800
---
apiVersion: sandbox.kce.ksyun.com/v1alpha1
kind: SandboxClaim
metadata:
  name: demo-claim
  namespace: sandbox-demo
spec:
  replicas: 2
  templateRef:
    name: custom-app
  timeoutSeconds: 1800
