apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-operator
  namespace: sandbox-operator-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sandbox-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sandbox-operator
    spec:
      serviceAccountName: sandbox-operator
      containers:
        - name: manager
          image: sandbox-operator:latest
          envFrom:
            - configMapRef:
                name: sandbox-operator-config
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          args:
            - --leader-elect=$(LEADER_ELECT)
            - --openapi-base-url=$(OPENAPI_BASE_URL)
            - --openapi-auth-mode=$(OPENAPI_AUTH_MODE)
            - --openapi-service=$(OPENAPI_SERVICE)
            - --openapi-version=$(OPENAPI_VERSION)
            - --default-openapi-credential-secret=$(DEFAULT_OPENAPI_CREDENTIAL_SECRET)
            - --poll-interval=$(POLL_INTERVAL)
            - --poll-page-size=$(POLL_PAGE_SIZE)
            - --max-concurrent-namespaces=$(MAX_CONCURRENT_NAMESPACES)
            - --sync-namespaces=$(SYNC_NAMESPACES)
            - --metrics-bind-address=$(METRICS_BIND_ADDRESS)
            - --health-probe-bind-address=$(HEALTH_PROBE_BIND_ADDRESS)
          ports:
            - containerPort: 9443
              name: webhook
            - containerPort: 8080
              name: metrics
            - containerPort: 8081
              name: probes
          volumeMounts:
            - name: webhook-cert
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: webhook-cert
          secret:
            secretName: sandbox-operator-webhook-server-cert
