# Empty means the Helm release namespace. Override only when resources must be
# installed into a namespace different from the release namespace.
namespace: ""
createNamespace: false

image:
  repository: "hub.kce.ksyun.com/ksyun-public/sandbox-operator"
  tag: "v20260707"
  pullPolicy: IfNotPresent

imagePullSecrets: []

config:
  # 金山云内部账号可改用内网地址：http://aicp.cn-beijing-6.inner.api.ksyun.com
  openapiBaseURL: http://aicp.cn-beijing-6.api.ksyun.com
  openapiAuthMode: kop-sigv4
  openapiService: aicp
  openapiVersion: "2026-04-01"
  defaultOpenAPICredentialSecret: sandbox-openapi-credentials
  pollInterval: 30s
  pollPageSize: "100"
  maxConcurrentNamespaces: "5"
  syncNamespaces: ""
  metricsBindAddress: :8080
  healthProbeBindAddress: :8081
  leaderElect: "true"

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

certManager:
  enabled: false

webhook:
  tlsSecretName: sandbox-operator-webhook-server-cert
  selfSigned:
    enabled: true
  caBundle: ""
