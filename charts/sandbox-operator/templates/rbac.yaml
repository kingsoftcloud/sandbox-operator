apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-operator
  namespace: {{ include "sandbox-operator.namespace" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sandbox-operator
rules:
  - apiGroups: [""]
    resources: ["namespaces", "secrets", "configmaps", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["sandbox.kce.ksyun.com"]
    resources: ["sandboxtemplates", "sandboxes", "sandboxclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["sandbox.kce.ksyun.com"]
    resources: ["sandboxtemplates/status", "sandboxes/status", "sandboxclaims/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sandbox-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sandbox-operator
subjects:
  - kind: ServiceAccount
    name: sandbox-operator
    namespace: {{ include "sandbox-operator.namespace" . }}
