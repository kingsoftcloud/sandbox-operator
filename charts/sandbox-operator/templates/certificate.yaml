{{- if .Values.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: sandbox-operator-selfsigned
  namespace: {{ include "sandbox-operator.namespace" . }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sandbox-operator-serving-cert
  namespace: {{ include "sandbox-operator.namespace" . }}
spec:
  secretName: {{ .Values.webhook.tlsSecretName }}
  dnsNames:
    - sandbox-operator-webhook.{{ include "sandbox-operator.namespace" . }}.svc
    - sandbox-operator-webhook.{{ include "sandbox-operator.namespace" . }}.svc.cluster.local
  issuerRef:
    name: sandbox-operator-selfsigned
    kind: Issuer
{{- end }}
